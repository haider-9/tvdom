<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap"
            rel="stylesheet"
        />

        <!-- Theme initialization script - prevents flash -->
        <script>
            (function () {
                try {
                    // Add preload class to prevent transitions during load
                    document.documentElement.classList.add('preload');
                    
                    var theme =
                        localStorage.getItem("tvdom-theme") || "bubblegum";
                    var html = document.documentElement;

                    // Remove existing classes
                    html.classList.remove("dark", "theme-bubblegum", "theme-cyberpunk", "theme-doom65", "theme-claymorphism");

                    // Apply theme
                    if (theme === "dark") {
                        html.classList.add("dark");
                        html.setAttribute("data-theme", "dark");
                    } else if (theme === "bubblegum") {
                        html.classList.add("theme-bubblegum");
                        html.setAttribute("data-theme", "bubblegum");
                    } else if (theme === "cyberpunk") {
                        html.classList.add("theme-cyberpunk");
                        html.setAttribute("data-theme", "cyberpunk");
                    } else if (theme === "doom65") {
                        html.classList.add("theme-doom65");
                        html.setAttribute("data-theme", "doom65");
                    } else if (theme === "claymorphism") {
                        html.classList.add("theme-claymorphism");
                        html.setAttribute("data-theme", "claymorphism");
                    } else {
                        html.setAttribute("data-theme", "light");
                    }

                    console.log("Theme loaded:", theme);
                    
                    // Remove preload class after a short delay to enable transitions
                    setTimeout(function() {
                        html.classList.remove('preload');
                    }, 100);
                } catch (error) {
                    console.warn("Theme initialization failed:", error);
                    // Still remove preload class even if theme loading fails
                    setTimeout(function() {
                        document.documentElement.classList.remove('preload');
                    }, 100);
                }
            })();
                } catch (e) {
                    // Fallback to bubblegum
                    document.documentElement.classList.add("theme-bubblegum");
                    document.documentElement.setAttribute(
                        "data-theme",
                        "bubblegum",
                    );
                }
            })();
        </script>

        %sveltekit.head%
    </head>

    <body data-sveltekit-preload-data="hover">
        <div style="display: contents; font-family: &quot;Fira Code&quot;">
            %sveltekit.body%
        </div>
    </body>
</html>
